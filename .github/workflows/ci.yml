name: Shunkan CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test-linux:
    name: Build & Test (Linux Desktop & Core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Wayland, X11, OpenSSL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libx11-dev libxcb1-dev \
            libxkbcommon-dev libwayland-dev libssl-dev cmake

      - name: Cache Cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run full workspace test suite
        run: cargo test --workspace --all-targets --verbose

      - name: Build release binaries
        run: cargo build --release --workspace --verbose

  build-android:
    name: Build (Android Core & APK Skeleton)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain & Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Check compilation of core library for Android targets
        run: |
          cargo check --target aarch64-linux-android -p shunkan-core
          cargo check --target x86_64-linux-android -p shunkan-core
